services:
  database:
    image: mariadb:latest
    container_name: havceblog_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password_segreta
      MYSQL_DATABASE: havceblog
      MYSQL_USER: utente_db
      MYSQL_PASSWORD: Ciao1234oaiC
    volumes:
      - database:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
  backend:
    build: ./backend
    container_name: havceblog_backend
    restart: unless-stopped
    depends_on:
      - database
    environment:
      PORT: 3000
      DB_HOST: "database"
      DB_USER: "utente_db"
      DB_PASSWORD: "Ciao1234oaiC"
      DB_NAME: "havceblog"
      SECRET: "QeRbMudNjUiUCMySCBSSVPTkyvPwyZnOFsSbdaTvuPkxFiPPcH"
  frontend:
    build: ./frontend
    container_name: havceblog_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
volumes:
  database:
